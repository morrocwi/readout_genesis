name: Philosophy MEMK Registration

on:
  push:
    branches:
      - feat/register-philosophy-memk-v0.2.0
    paths:
      - 'domains/philosophy/**'
      - '.github/workflows/philosophy-memk.yml'
  pull_request:
    paths:
      - 'domains/philosophy/**'
      - '.github/workflows/philosophy-memk.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          show-progress: false
      - name: Rebuild current standalone companion
        run: python3 -B domains/philosophy/artifacts/rebuild_information_epistemic_foundation_v1_6_0.py
      - name: Check domain README hash
        if: always()
        run: echo 'cb0e75c266c3db9fc242ee90b97861b2d75862cca7f4a4c7969f29c2feabd9e6  domains/philosophy/README.md' | sha256sum -c -
      - name: Check release registry hash
        if: always()
        run: echo '57b368308b87a1ebd33900fb789ac59e3abdd239397fc9e6687b58d250c2b2cd  domains/philosophy/FOUNDATION_RELEASE_REGISTRY_PHILOSOPHY_MEMK.yaml' | sha256sum -c -
      - name: Check validation receipt hash
        if: always()
        run: echo 'edee9d1110265c675665e07c91800c0e86b5d278f6c8ec9cea9cd97ef6ca3313  domains/philosophy/INFORMATION_EPISTEMIC_FOUNDATION_STANDALONE_v1.6.0.validation.yaml' | sha256sum -c -
      - name: Check artifact README hash
        if: always()
        run: echo '6e597bd6382f0d4da220f404ecea1aa7548f01774984152ec08d72e087b4945c  domains/philosophy/artifacts/README.md' | sha256sum -c -
      - name: Check rebuild verifier hash
        if: always()
        run: echo '5acf62a157c630d5c6895ae887756dee888d8a0246fc13d5d0c07703d7644871  domains/philosophy/artifacts/rebuild_information_epistemic_foundation_v1_6_0.py' | sha256sum -c -
      - name: Verify full checksum manifest
        if: always()
        working-directory: domains/philosophy
        run: sha256sum -c CHECKSUMS_SHA256_PHILOSOPHY_MEMK.txt
      - name: Run primary registration checker
        if: always()
        run: python3 -B domains/philosophy/philosophy_memk_closure_v0_2_0.py
      - name: Run independent registration checker
        if: always()
        run: python3 -B domains/philosophy/checker_philosophy_memk.py
