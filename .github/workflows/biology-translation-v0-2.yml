name: Biology Translation v0.2

on:
  push:
    paths:
      - 'domains/biology/translation_v0_2/**'
      - '.github/workflows/biology-translation-v0-2.yml'
  pull_request:
    paths:
      - 'domains/biology/translation_v0_2/**'
      - '.github/workflows/biology-translation-v0-2.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run translation compiler verifier
        run: python3 domains/biology/translation_v0_2/run_tests.py
